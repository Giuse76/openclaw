services:
  - type: web
    name: openclaw
    runtime: image
    repo: https://github.com/Giuse76/openclaw
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: node dist/index.js gateway
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      - key: OPENCLAW_GATEWAY_PORT
        value: 10000
      - key: WALLET_ADDRESS
        value: 0xaf06372059Fb66339dd1a64a431A8B8e817e1486
      - key: NETWORK
        value: base
      - key: NODE_OPTIONS
        value: --max-old-space-size=896
    healthCheckPath: /health
    autoDeploy: true
